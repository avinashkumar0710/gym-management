databases:
  - name: gym-management-db
    plan: free

services:
  - type: web
    name: gym-management
    env: php
    region: oregon
    plan: free
    buildCommand: |
      # No build needed for PHP
    startCommand: |
      php -S 0.0.0.0:$PORT
    healthCheckPath: /
    envVars:
      - fromDatabase:
          name: gym-management-db
          property: connectionString
